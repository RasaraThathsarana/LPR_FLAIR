# SLURM

paths :   
    out_folder: ../results/
    out_model_name: AuX_exp_2

    train_csv: /home/cse/Documents/Rasara/FLAIR/FLAIR-HUB/csv/FLAIR-HUB_TRAIN.csv
    val_csv: /home/cse/Documents/Rasara/FLAIR/FLAIR-HUB/csv/FLAIR-HUB_VALID.csv
    test_csv: /home/cse/Documents/Rasara/FLAIR/FLAIR-HUB/csv/FLAIR-HUB_TEST.csv
    global_mtd_folder: /home/cse/Documents/Rasara/FLAIR/FLAIR-HUB/FLAIR-HUB_download/data/GLOBAL_ALL_MTD/
    ckpt_model_path: 
tasks: 
    train: True
    train_tasks: 
        init_weights_only_from_ckpt: False
        resume_training_from_ckpt: False
        train_backbone: True

    predict: True
    write_files: True
    georeferencing_output: False
    metrics_only: False

hyperparams:
    num_epochs: 15
    batch_size: 14
    seed: 2025
    learning_rate: 0.0001

    optimizer: adamw  # [sgd / adam / adamw]
    optim_weight_decay: 0.01
    optim_betas: [0.9, 0.999]

    scheduler: one_cycle_lr #  [one_cycle_lr / reduce_on_plateau / cycle_then_plateau]
    warmup_fraction: 0.2 # if using one_cycle_lr. [0-1]
    plateau_patience: 5 # if using cycle_then_plateau

hardware:
    accelerator: 'gpu'
    num_nodes: 1
    gpus_per_node: 1
    strategy: 'auto' # ddp_find_unused_parameters_true if num_nodes > 1
    num_workers: 4
    precision: '16-mixed'  # Enable mixed precision training

saving:   
    ckpt_save_also_last: True
    ckpt_weights_only: False
    ckpt_monitor: 'val_miou'
    ckpt_monitor_mode: 'max'
    ckpt_earlystopping_patience: 3
    cp_csv_and_conf_to_output: True
    enable_progress_bar: True
    progress_rate: 10
    ckpt_verbose: True
    verbose_config: False